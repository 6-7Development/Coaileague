# promote.yml — Development Branch CI Gate
# ─────────────────────────────────────────────────────────────────────────────
# Runs on every push to 'development' (where Trinity pushes [AI-Generated] commits).
# If all gates pass: creates a draft PR to main automatically.
# Human reviews and merges. Railway deploys on merge to main.
#
# Trinity's deployment path:
#   Trinity commits [AI-Generated] to 'development'
#         ↓
#   This workflow runs: typecheck + build + unit tests
#         ↓
#   All pass → draft PR created: development → main
#         ↓
#   Owner reviews AI-generated changes + /promote command drops link in #trinity-command
#         ↓
#   Owner approves + merges PR
#         ↓
#   Railway detects push to main → auto-deploys to production

name: Development → Production Gate

on:
  push:
    branches: [development]

concurrency:
  group: promote-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      DATABASE_URL: postgresql://unit-test-sentinel/noop
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Skip browser downloads (no Chromium on CI)
        run: |
          echo "PUPPETEER_SKIP_DOWNLOAD=1" >> $GITHUB_ENV
          echo "PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=1" >> $GITHUB_ENV
          echo "PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc -p tsconfig.ci.json --pretty false

      - name: Production build
        run: npm run build

      - name: Unit tests
        run: npx vitest run --reporter=verbose 2>&1 | tail -20

  create-pr:
    name: Create Draft PR → main
    runs-on: ubuntu-latest
    needs: gate
    # Only create PR if gate passed AND this is an AI-Generated commit
    if: |
      needs.gate.result == 'success' &&
      contains(github.event.head_commit.message, '[AI-Generated]')

    steps:
      - uses: actions/checkout@v4

      - name: Create draft PR to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:development`,
              base: 'main',
            });

            // Don't create a duplicate PR if one already exists
            if (existingPRs.length > 0) {
              console.log(`PR already exists: #${existingPRs[0].number}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AI-Generated] Development → Production ${new Date().toISOString().slice(0, 10)}`,
              head: 'development',
              base: 'main',
              body: [
                '## Trinity AI — Automated Promotion PR',
                '',
                'This PR was automatically created after all CI gates passed on the `development` branch.',
                '',
                '### Deployment path',
                '1. Review all commits marked `[AI-Generated]`',
                '2. Approve and merge this PR',
                '3. Railway auto-deploys to production on merge to main',
                '',
                '### 3-Strike Rule',
                'Trinity\'s self-healing governance limits her to 10 commits/day.',
                'All commits are logged to `trinity_patch_log`.',
                '',
                `**Triggered by:** ${context.payload.head_commit.message.slice(0, 100)}`,
              ].join('\n'),
              draft: true,
            });

            console.log(`Created draft PR #${pr.number}: ${pr.html_url}`);
