name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript bounded gate
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check bounded CI surface
        run: npx tsc -p tsconfig.ci.json --pretty false

      - name: Full strict typecheck diagnostics
        if: always()
        continue-on-error: true
        run: |
          mkdir -p test-results/typecheck
          timeout 900s npx tsc -p tsconfig.json --pretty false > test-results/typecheck/full-tsc.log 2>&1
          status=$?
          echo "full-tsc-exit-code=$status" | tee test-results/typecheck/full-tsc.status
          exit 0

      - name: Upload full typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-tsc-diagnostics
          path: test-results/typecheck/
          retention-days: 14

  build:
    name: Production Build
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://unit-test-sentinel/noop
      NODE_ENV: test
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx vitest run --project unit --reporter=verbose --pool=forks

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: test-results/coverage/
          retention-days: 14

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://unit-test-sentinel/noop
      NODE_ENV: test
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration & regression tests
        # Tests guard themselves with describe.skipIf(() => !serverAvailable),
        # so they skip gracefully when no server is running in CI.
        run: npx vitest run --project integration --reporter=verbose --pool=forks
