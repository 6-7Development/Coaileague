<svg width="240" height="80" viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White version for dark backgrounds -->
  <defs>
    <filter id="neon-glow-white" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="gradient-white" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main W shape with neon effect -->
  <g filter="url(#neon-glow-white)">
    <path d="M 15 15 L 25 55 L 35 25 L 45 55 L 55 15" 
          stroke="url(#gradient-white)" 
          stroke-width="6" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"/>
  </g>
  
  <!-- OS superscript -->
  <text x="62" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#60a5fa" opacity="0.9">
    OS
  </text>
  
  <!-- WorkforceOS text -->
  <text x="80" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#f1f5f9">
    Workforce
  </text>
  <text x="208" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#60a5fa">
    OS
  </text>
  
  <!-- Tagline -->
  <text x="80" y="62" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">
    Complete Workforce Management Platform
  </text>
</svg>
